<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Miętol Kostka</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1a2e;
      touch-action: none;
    }
    #game-container {
      width: 100%;
      height: 100%;
    }
    canvas {
      display: block;
    }

    /* Desktop nav arrows — outside the game canvas */
    .nav-arrow {
      display: none;
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      font-size: 48px;
      color: #555;
      cursor: pointer;
      user-select: none;
      transition: color 0.2s;
      z-index: 100;
      padding: 20px;
    }
    .nav-arrow:hover { color: #ffe66d; }
    #nav-left { left: 16px; }
    #nav-right { right: 16px; }

    /* Only show when there's space outside the game canvas */
    @media (min-width: 500px) {
      .nav-arrow { display: block; }
    }
  </style>
  <script type="module" crossorigin src="/assets/index-DMQgwPP4.js"></script>
</head>
<body>
  <div id="nav-left" class="nav-arrow">‹</div>
  <div id="nav-right" class="nav-arrow">›</div>
  <div id="game-container"></div>
  <script data-goatcounter="https://kostek.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</body>
</html>
